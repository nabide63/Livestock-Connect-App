<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Add or edit livestock record.">
  <title>Add Livestock - Livestock Connect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header">
      <h1 id="page-title">Add Animal</h1>
      <p class="text-muted">Enter your animal details below.</p>
    </header>

    <div id="form-alert" class="alert" role="alert" aria-live="polite" style="display: none;"></div>

    <!-- Optional: image upload -->
    <div class="form-group">
      <label class="form-label">Animal Photo (optional)</label>
      <div class="upload-area" id="upload-area">
        <input type="file" id="image-input" class="sr-only" accept="image/*" aria-label="Choose animal photo">
        <span id="upload-text">Tap to add photo</span>
        <img id="upload-preview" class="upload-preview" alt="" style="display: none;">
      </div>
    </div>

    <form id="livestock-form" novalidate>
      <input type="hidden" id="edit-id" name="editId" value="">
      <div class="form-group">
        <label class="form-label" for="animalType">Animal Type</label>
        <select id="animalType" class="form-select" name="animalType" required aria-required="true">
          <option value="">Choose type</option>
          <option value="Cattle">Cattle</option>
          <option value="Goats">Goats</option>
          <option value="Sheep">Sheep</option>
          <option value="Poultry">Poultry</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="age">Age</label>
        <input type="text" id="age" class="form-input" name="age" placeholder="e.g. 2 years" aria-required="false">
      </div>
      <div class="form-group">
        <label class="form-label" for="weight">Weight (kg)</label>
        <input type="text" id="weight" class="form-input" name="weight" placeholder="e.g. 150" inputmode="decimal" aria-required="false">
      </div>
      <div class="form-group">
        <label class="form-label" for="healthStatus">Health Status</label>
        <select id="healthStatus" class="form-select" name="healthStatus" aria-required="false">
          <option value="Healthy">Healthy</option>
          <option value="Needs Checkup">Needs Checkup</option>
          <option value="Sick">Sick</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="notes">Notes</label>
        <textarea id="notes" class="form-textarea" name="notes" placeholder="Any extra details (optional)" aria-required="false"></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Save Livestock</button>
    </form>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a href="dashboard.html" class="nav-item">
      <span class="nav-item-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="livestock.html" class="nav-item">
      <span class="nav-item-icon">🐄</span>
      <span>Livestock</span>
    </a>
    <a href="add-livestock.html" class="nav-item active" aria-current="page">
      <span class="nav-item-icon">➕</span>
      <span>Add</span>
    </a>
    <a href="prices.html" class="nav-item">
      <span class="nav-item-icon">💰</span>
      <span>Prices</span>
    </a>
    <a href="health.html" class="nav-item">
      <span class="nav-item-icon">💚</span>
      <span>Health</span>
    </a>
  </nav>

  <script src="js/app.js"></script>
  <script src="data/mock-data.js"></script>
  <script>
    (function () {
      if (!window.LivestockConnect.requireAuth()) return;

      const form = document.getElementById('livestock-form');
      const alertEl = document.getElementById('form-alert');
      const editIdEl = document.getElementById('edit-id');
      const pageTitleEl = document.getElementById('page-title');
      const submitBtn = document.getElementById('submit-btn');
      const uploadArea = document.getElementById('upload-area');
      const imageInput = document.getElementById('image-input');
      const uploadText = document.getElementById('upload-text');
      const uploadPreview = document.getElementById('upload-preview');
      const LC = window.LivestockConnect;

      let imageData = null;

      const params = new URLSearchParams(window.location.search);
      const editId = params.get('edit');

      const showAlert = (message, type) => {
        alertEl.textContent = message;
        alertEl.className = 'alert alert-' + (type === 'error' ? 'error' : 'success');
        alertEl.style.display = 'block';
      };

      if (editId) {
        const record = LC.getLivestockById(editId);
        if (record) {
          pageTitleEl.textContent = 'Edit Animal';
          submitBtn.textContent = 'Update';
          editIdEl.value = editId;
          document.getElementById('animalType').value = record.animalType || '';
          document.getElementById('age').value = record.age || '';
          document.getElementById('weight').value = record.weight || '';
          document.getElementById('healthStatus').value = record.healthStatus || 'Healthy';
          document.getElementById('notes').value = record.notes || '';
          if (record.imageData) {
            uploadPreview.src = record.imageData;
            uploadPreview.style.display = 'block';
            uploadText.style.display = 'none';
            uploadArea.classList.add('has-image');
            imageData = record.imageData;
          }
        }
      }

      uploadArea.addEventListener('click', function () {
        imageInput.click();
      });
      imageInput.addEventListener('change', function () {
        const file = this.files && this.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = function () {
          imageData = reader.result;
          uploadPreview.src = imageData;
          uploadPreview.style.display = 'block';
          uploadText.style.display = 'none';
          uploadArea.classList.add('has-image');
        };
        reader.readAsDataURL(file);
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        alertEl.style.display = 'none';

        const animalType = form.animalType.value;
        if (!animalType) {
          showAlert('Please choose animal type.', 'error');
          return;
        }

        const payload = {
          animalType: animalType,
          age: form.age.value.trim(),
          weight: form.weight.value.trim(),
          healthStatus: form.healthStatus.value || 'Healthy',
          notes: form.notes.value.trim(),
          imageData: imageData
        };

        if (editIdEl.value) {
          const result = LC.updateLivestock(editIdEl.value, payload);
          if (result.success) {
            LC.showToast(result.message);
            window.location.href = 'livestock.html';
          } else {
            showAlert(result.message, 'error');
          }
        } else {
          const result = LC.addLivestock(payload);
          if (result.success) {
            LC.showToast('Livestock successfully added.');
            form.reset();
            imageData = null;
            uploadPreview.style.display = 'none';
            uploadText.style.display = 'block';
            uploadArea.classList.remove('has-image');
            showAlert(result.message, 'success');
          } else {
            showAlert(result.message, 'error');
          }
        }
      });
    })();
  </script>
</body>
</html>
