<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Market prices for livestock.">
  <title>Market Prices - Livestock Connect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header">
      <h1>Market Prices</h1>
      <p class="text-muted">Current prices in your area. Use as a guide when selling.</p>
    </header>

    <p class="prices-updated" id="prices-updated">Last updated: —</p>

    <div id="prices-container" role="list"></div>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a href="dashboard.html" class="nav-item">
      <span class="nav-item-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="livestock.html" class="nav-item">
      <span class="nav-item-icon">🐄</span>
      <span>Livestock</span>
    </a>
    <a href="add-livestock.html" class="nav-item">
      <span class="nav-item-icon">➕</span>
      <span>Add</span>
    </a>
    <a href="prices.html" class="nav-item active" aria-current="page">
      <span class="nav-item-icon">💰</span>
      <span>Prices</span>
    </a>
    <a href="health.html" class="nav-item">
      <span class="nav-item-icon">💚</span>
      <span>Health</span>
    </a>
  </nav>

  <script src="js/app.js"></script>
  <script src="data/mock-data.js"></script>
  <script>
    (function () {
      if (!window.LivestockConnect.requireAuth()) return;

      const container = document.getElementById('prices-container');
      const updatedEl = document.getElementById('prices-updated');

      if (typeof MOCK_DATA !== 'undefined' && MOCK_DATA.pricesLastUpdated) {
        updatedEl.textContent = 'Last updated: ' + MOCK_DATA.pricesLastUpdated;
      }

      const prices = typeof MOCK_DATA !== 'undefined' ? MOCK_DATA.marketPrices : [
        { type: 'Cow', price: 1200000, unit: 'UGX' },
        { type: 'Goat', price: 250000, unit: 'UGX' },
        { type: 'Sheep', price: 300000, unit: 'UGX' },
        { type: 'Poultry', price: 35000, unit: 'UGX' }
      ];

      prices.forEach(function (item) {
        const card = document.createElement('div');
        card.className = 'price-card';
        card.setAttribute('role', 'listitem');
        card.innerHTML =
          '<span class="price-type">' + item.type + '</span>' +
          '<span class="price-value">' + window.LivestockConnect.formatUGX(item.price) + '</span>';
        container.appendChild(card);
      });
    })();
  </script>
</body>
</html>
