<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Market prices for livestock.">
  <title>Market Prices - Livestock Connect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header">
      <a href="#" class="back-link" aria-label="Go back to previous page" onclick="event.preventDefault(); history.back(); return false;">← Back</a>
      <h1>Market Prices</h1>
      <p class="text-muted">Current prices in your area (UGX). Use as a guide when buying or selling.</p>
    </header>

    <p class="prices-updated" id="prices-updated">Last updated: —</p>

    <div id="prices-container" role="list"></div>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation" id="bottom-nav"></nav>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="data/mock-data.js"></script>
  <script>
    (function () {
      const user = window.LivestockConnect.getCurrentUser();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const container = document.getElementById('prices-container');
      const updatedEl = document.getElementById('prices-updated');
      const navEl = document.getElementById('bottom-nav');

      if (typeof MOCK_DATA !== 'undefined' && MOCK_DATA.pricesLastUpdated) {
        updatedEl.textContent = 'Last updated: ' + MOCK_DATA.pricesLastUpdated;
      }

      const prices = typeof MOCK_DATA !== 'undefined' ? MOCK_DATA.marketPrices : [
        { type: 'Cow', price: 1200000, unit: 'UGX' },
        { type: 'Goat', price: 250000, unit: 'UGX' },
        { type: 'Sheep', price: 300000, unit: 'UGX' },
        { type: 'Hen', price: 35000, unit: 'UGX' },
        { type: 'Rabbits', price: 55000, unit: 'UGX' },
        { type: 'Pigs', price: 350000, unit: 'UGX' },
        { type: 'Ducks', price: 40000, unit: 'UGX' },
        { type: 'Turkeys', price: 90000, unit: 'UGX' },
        { type: 'Pigeons', price: 20000, unit: 'UGX' },
        { type: 'Guinea fowls', price: 40000, unit: 'UGX' }
      ];

      prices.forEach(function (item) {
        const card = document.createElement('div');
        card.className = 'price-card';
        card.setAttribute('role', 'listitem');
        card.innerHTML =
          '<span class="price-type">' + item.type + '</span>' +
          '<span class="price-value">' + window.LivestockConnect.formatUGX(item.price) + '</span>';
        container.appendChild(card);
      });

      if (user.role === 'farmer') {
        navEl.innerHTML =
          '<a href="dashboard.html" class="nav-item"><span class="nav-item-icon">🏠</span><span>Home</span></a>' +
          '<a href="farmer/add-animal.html" class="nav-item"><span class="nav-item-icon">➕</span><span>Add Animal</span></a>' +
          '<a href="farmer/my-listings.html" class="nav-item"><span class="nav-item-icon">📋</span><span>My Listings</span></a>' +
          '<a href="health.html" class="nav-item"><span class="nav-item-icon">💚</span><span>Health Tips</span></a>' +
          '<a href="profile.html" class="nav-item"><span class="nav-item-icon">👤</span><span>Profile</span></a>';
      } else {
        navEl.innerHTML =
          '<a href="buyer/marketplace.html" class="nav-item"><span class="nav-item-icon">🛒</span><span>Marketplace</span></a>' +
          '<a href="buyer/marketplace.html" class="nav-item"><span class="nav-item-icon">🔍</span><span>Search</span></a>' +
          '<a href="prices.html" class="nav-item active" aria-current="page"><span class="nav-item-icon">💰</span><span>Prices</span></a>' +
          '<a href="profile.html" class="nav-item"><span class="nav-item-icon">👤</span><span>Profile</span></a>';
      }
    })();
  </script>
</body>
</html>
