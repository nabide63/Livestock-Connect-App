<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Your Livestock Connect profile.">
  <title>My Profile - Livestock Connect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header">
      <h1>My Profile</h1>
      <p class="text-muted">Your account details.</p>
    </header>

    <div class="profile-section">
      <h2>Account</h2>
      <div class="detail-list">
        <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value" id="profile-name">—</span></div>
        <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value" id="profile-phone">—</span></div>
        <div class="detail-row"><span class="detail-label">Location</span><span class="detail-value" id="profile-location">—</span></div>
        <div class="detail-row"><span class="detail-label">Role</span><span class="detail-value" id="profile-role">—</span></div>
      </div>
    </div>

    <button type="button" class="btn btn-outline btn-block mt-2" id="logout-btn">Logout</button>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation" id="bottom-nav"></nav>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      const user = window.LivestockConnect.getCurrentUser();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      document.getElementById('profile-name').textContent = user.fullName || '—';
      document.getElementById('profile-phone').textContent = user.phone || '—';
      document.getElementById('profile-location').textContent = user.location || '—';
      document.getElementById('profile-role').textContent = user.role === 'farmer' ? 'Farmer (Seller)' : 'Buyer';

      document.getElementById('logout-btn').addEventListener('click', function () {
        window.LivestockConnect.logout();
      });

      const navEl = document.getElementById('bottom-nav');
      if (user.role === 'farmer') {
        navEl.innerHTML =
          '<a href="dashboard.html" class="nav-item"><span class="nav-item-icon">🏠</span><span>Home</span></a>' +
          '<a href="farmer/add-animal.html" class="nav-item"><span class="nav-item-icon">➕</span><span>Add Animal</span></a>' +
          '<a href="farmer/my-listings.html" class="nav-item"><span class="nav-item-icon">📋</span><span>My Listings</span></a>' +
          '<a href="health.html" class="nav-item"><span class="nav-item-icon">💚</span><span>Health Tips</span></a>' +
          '<a href="profile.html" class="nav-item active" aria-current="page"><span class="nav-item-icon">👤</span><span>Profile</span></a>';
      } else {
        navEl.innerHTML =
          '<a href="buyer/marketplace.html" class="nav-item"><span class="nav-item-icon">🛒</span><span>Marketplace</span></a>' +
          '<a href="buyer/marketplace.html" class="nav-item"><span class="nav-item-icon">🔍</span><span>Search</span></a>' +
          '<a href="prices.html" class="nav-item"><span class="nav-item-icon">💰</span><span>Prices</span></a>' +
          '<a href="profile.html" class="nav-item active" aria-current="page"><span class="nav-item-icon">👤</span><span>Profile</span></a>';
      }
    })();
  </script>
</body>
</html>
