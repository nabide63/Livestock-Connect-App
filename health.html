<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Livestock health tips for farmers.">
  <title>Health Tips - Livestock Connect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header">
      <h1>Health Tips</h1>
      <p class="text-muted">Simple advice to keep your animals healthy.</p>
    </header>

    <div id="health-tips-container" role="list"></div>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a href="dashboard.html" class="nav-item">
      <span class="nav-item-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="livestock.html" class="nav-item">
      <span class="nav-item-icon">🐄</span>
      <span>Livestock</span>
    </a>
    <a href="add-livestock.html" class="nav-item">
      <span class="nav-item-icon">➕</span>
      <span>Add</span>
    </a>
    <a href="prices.html" class="nav-item">
      <span class="nav-item-icon">💰</span>
      <span>Prices</span>
    </a>
    <a href="health.html" class="nav-item active" aria-current="page">
      <span class="nav-item-icon">💚</span>
      <span>Health</span>
    </a>
  </nav>

  <script src="js/app.js"></script>
  <script src="data/mock-data.js"></script>
  <script>
    (function () {
      if (!window.LivestockConnect.requireAuth()) return;

      const container = document.getElementById('health-tips-container');
      const tips = typeof MOCK_DATA !== 'undefined' && MOCK_DATA.healthTips
        ? MOCK_DATA.healthTips
        : [
            { id: 1, icon: '💉', title: 'Vaccinate animals regularly', description: 'Keep your animals healthy by giving vaccines on time. Ask your vet for a schedule.' },
            { id: 2, icon: '💧', title: 'Provide clean drinking water', description: 'Animals need fresh, clean water every day. Change water often and keep containers clean.' },
            { id: 3, icon: '⚖️', title: 'Monitor animal weight weekly', description: 'Weigh your animals to see if they are growing well. Write down the numbers.' },
            { id: 4, icon: '🏠', title: 'Separate sick animals', description: 'When an animal is sick, keep it away from others so illness does not spread.' }
          ];

      tips.forEach(function (tip) {
        const card = document.createElement('div');
        card.className = 'health-tip-card';
        card.setAttribute('role', 'listitem');
        card.innerHTML =
          '<div class="health-tip-icon" aria-hidden="true">' + (tip.icon || '💚') + '</div>' +
          '<h3 class="health-tip-title">' + (tip.title || '') + '</h3>' +
          '<p class="health-tip-desc">' + (tip.description || '') + '</p>';
        container.appendChild(card);
      });
    })();
  </script>
</body>
</html>
