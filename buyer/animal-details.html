<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Animal details - Livestock Connect">
  <title>Animal Details - Livestock Connect</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header">
      <h1>Animal Details</h1>
      <p class="text-muted" id="subtitle">Full information about this animal.</p>
    </header>

    <div id="details-container"></div>
    <div id="not-found" class="empty-state" style="display: none;">
      <span class="empty-state-icon" aria-hidden="true">🐄</span>
      <p>This listing was not found.</p>
      <a href="marketplace.html" class="btn btn-primary btn-block mt-2">Back to Marketplace</a>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a href="marketplace.html" class="nav-item">
      <span class="nav-item-icon">🛒</span>
      <span>Marketplace</span>
    </a>
    <a href="marketplace.html" class="nav-item">
      <span class="nav-item-icon">🔍</span>
      <span>Search</span>
    </a>
    <a href="../prices.html" class="nav-item">
      <span class="nav-item-icon">💰</span>
      <span>Prices</span>
    </a>
    <a href="../profile.html" class="nav-item">
      <span class="nav-item-icon">👤</span>
      <span>Profile</span>
    </a>
  </nav>

  <script src="../js/app.js"></script>
  <script src="../data/mock-data.js"></script>
  <script src="../data/seed.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/livestock.js"></script>
  <script>
    (function () {
      const container = document.getElementById('details-container');
      const notFound = document.getElementById('not-found');

      const showNotFound = () => {
        if (container) { container.innerHTML = ''; container.style.display = 'none'; }
        if (notFound) notFound.style.display = 'block';
      };

      const showError = (message) => {
        if (notFound) notFound.style.display = 'none';
        if (container) {
          container.style.display = 'block';
          container.innerHTML = '<div class="empty-state"><p class="text-muted">' + message + '</p><a href="marketplace.html" class="btn btn-primary btn-block mt-2">Back to Marketplace</a></div>';
        }
      };

      const escapeHtml = (str) => {
        if (str == null || str === '') return '';
        const s = String(str);
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      };

      try {
        if (!window.LivestockConnect || !window.LivestockConnect.requireAuth('buyer')) return;

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') ? params.get('id').trim() : '';

        if (!id) {
          showNotFound();
          return;
        }

        const Livestock = window.LivestockConnectLivestock;
        const LC = window.LivestockConnect;
        if (!Livestock || !LC) {
          showError('Unable to load details. Please refresh the page.');
          return;
        }

        const listing = Livestock.getListingById(id);
        if (!listing) {
          showNotFound();
          return;
        }

        const farmer = Livestock.getFarmerById(listing.userId);
        const farmerName = farmer ? farmer.fullName : 'Farmer';
        const priceNum = parseInt(listing.price, 10);
        const priceStr = isNaN(priceNum) ? (listing.price || '—') : LC.formatUGX(priceNum);
        const healthClass = LC.getHealthBadgeClass(listing.healthStatus);
        const detailImageUrl = Livestock.getListingImageUrl(listing);
        const safeImageUrl = detailImageUrl ? detailImageUrl.replace(/"/g, '&quot;').replace(/'/g, '&#39;') : '';
        const detailImageHtml = detailImageUrl
          ? '<div class="listing-detail-image"><img src="' + safeImageUrl + '" alt="Photo of ' + escapeHtml(listing.animalType || 'animal') + '"></div>'
          : '<div class="listing-detail-image listing-detail-image-placeholder"><span aria-hidden="true">🐄</span><p class="text-muted">No photo</p></div>';

        const descHtml = listing.description
          ? '<div class="detail-row"><span class="detail-label">Description</span><span class="detail-value">' + escapeHtml(listing.description) + '</span></div>'
          : '';

        if (notFound) notFound.style.display = 'none';
        if (container) {
          container.style.display = 'block';
          container.innerHTML =
            detailImageHtml +
            '<div class="detail-list">' +
              '<div class="detail-row"><span class="detail-label">Animal type</span><span class="detail-value">' + escapeHtml(listing.animalType || '—') + '</span></div>' +
              '<div class="detail-row"><span class="detail-label">Age</span><span class="detail-value">' + escapeHtml(listing.age || '—') + '</span></div>' +
              '<div class="detail-row"><span class="detail-label">Weight</span><span class="detail-value">' + escapeHtml(listing.weight || '—') + ' kg</span></div>' +
              '<div class="detail-row"><span class="detail-label">Price</span><span class="detail-value">' + escapeHtml(priceStr) + '</span></div>' +
              '<div class="detail-row"><span class="detail-label">Health status</span><span class="detail-value ' + (healthClass || '') + '">' + escapeHtml(listing.healthStatus || '—') + '</span></div>' +
              '<div class="detail-row"><span class="detail-label">Location</span><span class="detail-value">' + escapeHtml(listing.location || '—') + '</span></div>' +
              '<div class="detail-row"><span class="detail-label">Farmer</span><span class="detail-value">' + escapeHtml(farmerName) + '</span></div>' +
              descHtml +
            '</div>' +
            '<a href="contact-farmer.html?userId=' + encodeURIComponent(listing.userId) + '" class="btn btn-primary btn-block">Contact Farmer</a>';
        }
      } catch (err) {
        showError('Unable to load details. Please try again or go back to the marketplace.');
        if (typeof console !== 'undefined' && console.error) console.error('Animal details error:', err);
      }
    })();
  </script>
</body>
</html>
