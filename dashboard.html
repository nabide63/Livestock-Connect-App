<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Your Livestock Connect dashboard.">
  <title>Dashboard - Livestock Connect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="dashboard-header">
      <h1 id="welcome-message">Welcome</h1>
      <p class="text-muted">Manage your animals and check market prices.</p>
    </header>

    <section class="dashboard-stats" aria-label="Quick statistics">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total Livestock</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-recent">0</div>
        <div class="stat-label">Recently Added</div>
      </div>
    </section>

    <nav aria-label="Main features">
      <a href="livestock.html" class="card-link">
        <span class="card-link-icon" aria-hidden="true">🐄</span>
        <span class="card-link-text">My Livestock</span>
      </a>
      <a href="add-livestock.html" class="card-link">
        <span class="card-link-icon" aria-hidden="true">➕</span>
        <span class="card-link-text">Add Livestock</span>
      </a>
      <a href="prices.html" class="card-link">
        <span class="card-link-icon" aria-hidden="true">💰</span>
        <span class="card-link-text">Market Prices</span>
      </a>
      <a href="health.html" class="card-link">
        <span class="card-link-icon" aria-hidden="true">💚</span>
        <span class="card-link-text">Health Tips</span>
      </a>
      <a href="reports.html" class="card-link">
        <span class="card-link-icon" aria-hidden="true">📊</span>
        <span class="card-link-text">Reports</span>
      </a>
      <a href="profile.html" class="card-link">
        <span class="card-link-icon" aria-hidden="true">👤</span>
        <span class="card-link-text">My Profile</span>
      </a>
    </nav>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a href="dashboard.html" class="nav-item active" aria-current="page">
      <span class="nav-item-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="livestock.html" class="nav-item">
      <span class="nav-item-icon">🐄</span>
      <span>Livestock</span>
    </a>
    <a href="add-livestock.html" class="nav-item">
      <span class="nav-item-icon">➕</span>
      <span>Add</span>
    </a>
    <a href="prices.html" class="nav-item">
      <span class="nav-item-icon">💰</span>
      <span>Prices</span>
    </a>
    <a href="health.html" class="nav-item">
      <span class="nav-item-icon">💚</span>
      <span>Health</span>
    </a>
  </nav>

  <script src="js/app.js"></script>
  <script>
    (function () {
      if (!window.LivestockConnect.requireAuth()) return;

      const user = window.LivestockConnect.getCurrentUser();
      const welcomeEl = document.getElementById('welcome-message');
      if (user && welcomeEl) {
        const name = user.fullName ? user.fullName.split(' ')[0] : 'Farmer';
        welcomeEl.textContent = 'Welcome, ' + name;
      }

      const stats = window.LivestockConnect.getLivestockStats();
      const totalEl = document.getElementById('stat-total');
      const recentEl = document.getElementById('stat-recent');
      if (totalEl) totalEl.textContent = stats.total;
      if (recentEl) recentEl.textContent = stats.recentlyAdded;
    })();
  </script>
</body>
</html>
