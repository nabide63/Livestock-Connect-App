<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Create your Livestock Connect account.">
  <title>Create Account - Livestock Connect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="no-nav">
  <div class="app-container">
    <header class="page-header">
      <h1>Create Account</h1>
      <p class="text-muted">Join Livestock Connect to manage your animals and see market prices.</p>
    </header>

    <div id="register-alert" class="alert" role="alert" aria-live="polite" style="display: none;"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="fullName">Full Name</label>
        <input type="text" id="fullName" class="form-input" name="fullName" placeholder="Your full name" required autocomplete="name" aria-required="true">
      </div>
      <div class="form-group">
        <label class="form-label" for="phone">Phone Number</label>
        <input type="tel" id="phone" class="form-input" name="phone" placeholder="07XXXXXXXX" required autocomplete="tel" aria-required="true">
      </div>
      <div class="form-group">
        <label class="form-label" for="farmLocation">Farm Location</label>
        <input type="text" id="farmLocation" class="form-input" name="farmLocation" placeholder="Village or district" required autocomplete="street-address" aria-required="true">
      </div>
      <div class="form-group">
        <label class="form-label" for="livestockType">Livestock Type</label>
        <select id="livestockType" class="form-select" name="livestockType" required aria-required="true">
          <option value="">Choose type</option>
          <option value="Cattle">Cattle</option>
          <option value="Goats">Goats</option>
          <option value="Sheep">Sheep</option>
          <option value="Poultry">Poultry</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" name="password" placeholder="At least 4 characters" required minlength="4" autocomplete="new-password" aria-required="true">
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-input" name="confirmPassword" placeholder="Same as above" required autocomplete="new-password" aria-required="true">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <p class="text-muted mt-2" style="text-align: center;">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>
  <script src="js/app.js"></script>
  <script src="data/mock-data.js"></script>
  <script>
    (function () {
      const form = document.getElementById('register-form');
      const alertEl = document.getElementById('register-alert');

      const showAlert = (message, type) => {
        alertEl.textContent = message;
        alertEl.className = 'alert alert-' + (type === 'error' ? 'error' : 'success');
        alertEl.style.display = 'block';
      };

      const hideAlert = () => {
        alertEl.style.display = 'none';
      };

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        hideAlert();

        const data = {
          fullName: form.fullName.value.trim(),
          phone: form.phone.value.trim(),
          farmLocation: form.farmLocation.value.trim(),
          livestockType: form.livestockType.value,
          password: form.password.value,
          confirmPassword: form.confirmPassword.value
        };

        const result = window.LivestockConnect.registerUser(data);
        if (result.success) {
          showAlert(result.message, 'success');
          setTimeout(function () {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          showAlert(result.message, 'error');
        }
      });
    })();
  </script>
</body>
</html>
