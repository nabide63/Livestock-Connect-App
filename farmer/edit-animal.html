<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Edit animal listing - Livestock Connect">
  <title>Edit Animal - Livestock Connect</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header">
      <h1>Edit Animal</h1>
      <p class="text-muted">Update the details of your listing.</p>
    </header>

    <div id="edit-alert" class="alert" role="alert" aria-live="polite" style="display: none;"></div>

    <form id="edit-animal-form" novalidate>
      <input type="hidden" id="listingId" name="listingId">
      <div class="form-group">
        <label class="form-label" for="animalType">Animal Type</label>
        <select id="animalType" class="form-select" name="animalType" required aria-required="true">
          <option value="">Choose type</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="age">Age</label>
        <input type="text" id="age" class="form-input" name="age" placeholder="e.g. 2 years">
      </div>
      <div class="form-group">
        <label class="form-label" for="weight">Weight (kg)</label>
        <input type="text" id="weight" class="form-input" name="weight" placeholder="e.g. 150" required aria-required="true">
      </div>
      <div class="form-group">
        <label class="form-label" for="price">Price (UGX)</label>
        <input type="text" id="price" class="form-input" name="price" placeholder="e.g. 1200000" required aria-required="true">
      </div>
      <div class="form-group">
        <label class="form-label" for="healthStatus">Health Status</label>
        <select id="healthStatus" class="form-select" name="healthStatus">
          <option value="Healthy">Healthy</option>
          <option value="Needs Checkup">Needs Checkup</option>
          <option value="Sick">Sick</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="location">Location</label>
        <input type="text" id="location" class="form-input" name="location" placeholder="Village or district" required aria-required="true">
      </div>
      <div class="form-group">
        <label class="form-label" for="photo">Photo of livestock</label>
        <div id="current-photo" class="photo-preview" style="display: none;" aria-hidden="true"></div>
        <input type="file" id="photo" class="form-input form-input-file" name="photo" accept="image/*" aria-label="Change photo">
        <div id="photo-preview" class="photo-preview" style="display: none;" aria-hidden="true"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="description">Description</label>
        <textarea id="description" class="form-textarea" name="description" rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
    </form>
    <p class="text-center mt-2">
      <a href="my-listings.html">Back to My Listings</a>
    </p>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a href="../dashboard.html" class="nav-item">
      <span class="nav-item-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="add-animal.html" class="nav-item">
      <span class="nav-item-icon">➕</span>
      <span>Add Animal</span>
    </a>
    <a href="my-listings.html" class="nav-item active" aria-current="page">
      <span class="nav-item-icon">📋</span>
      <span>My Listings</span>
    </a>
    <a href="../health.html" class="nav-item">
      <span class="nav-item-icon">💚</span>
      <span>Health Tips</span>
    </a>
    <a href="../profile.html" class="nav-item">
      <span class="nav-item-icon">👤</span>
      <span>Profile</span>
    </a>
  </nav>

  <script src="../js/app.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/livestock.js"></script>
  <script src="../data/mock-data.js"></script>
  <script>
    (function () {
      if (!window.LivestockConnect.requireAuth('farmer')) return;

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        window.location.href = 'my-listings.html';
        return;
      }

      const Livestock = window.LivestockConnectLivestock;
      const listing = Livestock.getListingById(id);
      if (!listing) {
        window.LivestockConnect.showToast('Listing not found.', 'error');
        window.location.href = 'my-listings.html';
        return;
      }

      const form = document.getElementById('edit-animal-form');
      const alertEl = document.getElementById('edit-alert');
      const animalTypeSelect = document.getElementById('animalType');

      const animalTypes = typeof MOCK_DATA !== 'undefined' && MOCK_DATA.animalTypes
        ? MOCK_DATA.animalTypes
        : ['Cow', 'Goat', 'Sheep', 'Poultry'];
      animalTypes.forEach(function (t) {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        if (t === listing.animalType) opt.selected = true;
        animalTypeSelect.appendChild(opt);
      });

      form.listingId.value = listing.id;
      form.animalType.value = listing.animalType || '';
      form.age.value = listing.age || '';
      form.weight.value = listing.weight || '';
      form.price.value = listing.price || '';
      form.healthStatus.value = listing.healthStatus || 'Healthy';
      form.location.value = listing.location || '';
      form.description.value = listing.description || '';

      const currentPhotoEl = document.getElementById('current-photo');
      if (listing.imageData) {
        currentPhotoEl.innerHTML = '<img src="' + listing.imageData + '" alt="Current photo" class="photo-preview-img">';
        currentPhotoEl.style.display = 'block';
      }

      function resizeImageToDataUrl(file, maxWidth, quality, callback) {
        const reader = new FileReader();
        reader.onload = function (e) {
          const img = new Image();
          img.onload = function () {
            const canvas = document.createElement('canvas');
            let w = img.width;
            let h = img.height;
            if (w > maxWidth) {
              h = (h * maxWidth) / w;
              w = maxWidth;
            }
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            try {
              callback(canvas.toDataURL('image/jpeg', quality));
            } catch (err) {
              callback(e.target.result);
            }
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      const photoInput = document.getElementById('photo');
      const photoPreview = document.getElementById('photo-preview');
      photoInput.addEventListener('change', function () {
        const file = this.files[0];
        photoPreview.style.display = 'none';
        photoPreview.innerHTML = '';
        if (file && file.type.indexOf('image/') === 0) {
          resizeImageToDataUrl(file, 600, 0.75, function (dataUrl) {
            photoPreview.innerHTML = '<img src="' + dataUrl + '" alt="New photo" class="photo-preview-img">';
            photoPreview.style.display = 'block';
            photoPreview.setAttribute('data-url', dataUrl);
          });
        }
      });

      const showAlert = (message, type) => {
        alertEl.textContent = message;
        alertEl.className = 'alert alert-' + (type === 'error' ? 'error' : 'success');
        alertEl.style.display = 'block';
      };

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        alertEl.style.display = 'none';

        const priceVal = form.price.value.trim().replace(/\s/g, '');
        const newImageData = photoPreview.getAttribute('data-url');
        const result = Livestock.updateListing(id, {
          animalType: form.animalType.value,
          age: form.age.value.trim(),
          weight: form.weight.value.trim(),
          price: priceVal,
          healthStatus: form.healthStatus.value,
          location: form.location.value.trim(),
          description: form.description.value.trim(),
          imageData: newImageData !== null && newImageData !== '' ? newImageData : (listing.imageData || null)
        });

        if (result.success) {
          window.LivestockConnect.showToast(result.message, 'success');
          setTimeout(function () { window.location.href = 'my-listings.html'; }, 800);
        } else {
          showAlert(result.message, 'error');
        }
      });
    })();
  </script>
</body>
</html>
