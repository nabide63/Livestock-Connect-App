<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="View your livestock listings.">
  <title>My Livestock - Livestock Connect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header">
      <a href="#" class="back-link" aria-label="Go back to previous page" onclick="event.preventDefault(); history.back(); return false;">← Back</a>
      <h1>My Livestock</h1>
      <p class="text-muted">Your listed animals for sale. Edit or delete below, or use My Listings for the same data.</p>
    </header>

    <div id="livestock-list" class="listing-cards" role="list"></div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <span class="empty-state-icon" aria-hidden="true">🐄</span>
      <p>No animals listed yet. Add your first animal to get started.</p>
      <a href="farmer/add-animal.html" class="btn btn-primary btn-block mt-2">Add Animal</a>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a href="dashboard.html" class="nav-item">
      <span class="nav-item-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="farmer/add-animal.html" class="nav-item">
      <span class="nav-item-icon">➕</span>
      <span>Add Animal</span>
    </a>
    <a href="farmer/my-listings.html" class="nav-item">
      <span class="nav-item-icon">📋</span>
      <span>My Listings</span>
    </a>
    <a href="livestock.html" class="nav-item active" aria-current="page">
      <span class="nav-item-icon">🐄</span>
      <span>Livestock</span>
    </a>
    <a href="prices.html" class="nav-item">
      <span class="nav-item-icon">💰</span>
      <span>Prices</span>
    </a>
    <a href="health.html" class="nav-item">
      <span class="nav-item-icon">💚</span>
      <span>Health</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-item-icon">👤</span>
      <span>Profile</span>
    </a>
  </nav>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/livestock.js"></script>
  <script>
    (function () {
      if (!window.LivestockConnect.requireAuth('farmer')) return;

      const listEl = document.getElementById('livestock-list');
      const emptyEl = document.getElementById('empty-state');
      const LC = window.LivestockConnect;
      const Livestock = window.LivestockConnectLivestock;

      const renderList = () => {
        const list = Livestock.getMyListings();
        listEl.innerHTML = '';

        if (list.length === 0) {
          listEl.style.display = 'none';
          emptyEl.style.display = 'block';
          return;
        }

        listEl.style.display = 'flex';
        emptyEl.style.display = 'none';

        list.forEach(function (item) {
          const priceNum = parseInt(item.price, 10);
          const priceStr = isNaN(priceNum) ? item.price : LC.formatUGX(priceNum);
          const badgeClass = LC.getHealthBadgeClass(item.healthStatus);
          const imageUrl = Livestock.getListingImageUrl(item);
          const imageHtml = imageUrl
            ? '<div class="listing-card-image"><img src="' + imageUrl.replace(/"/g, '&quot;') + '" alt=""></div>'
            : '<div class="listing-card-image listing-card-image-placeholder"><span aria-hidden="true">🐄</span></div>';

          const card = document.createElement('div');
          card.className = 'listing-card';
          card.setAttribute('role', 'listitem');
          card.innerHTML =
            imageHtml +
            '<div class="listing-card-header">' +
              '<span class="listing-card-type">' + (item.animalType || 'Animal') + '</span>' +
              '<span class="health-badge ' + badgeClass + '">' + (item.healthStatus || 'Healthy') + '</span>' +
            '</div>' +
            '<div class="listing-card-meta">Price: ' + priceStr + '</div>' +
            '<div class="listing-card-meta">Weight: ' + (item.weight || '—') + ' kg &bull; Location: ' + (item.location || '—') + '</div>' +
            (item.description ? '<p class="text-muted" style="margin:8px 0 0;font-size:0.9rem;">' + item.description + '</p>' : '') +
            '<div class="listing-card-actions">' +
              '<a href="farmer/edit-animal.html?id=' + encodeURIComponent(item.id) + '" class="btn btn-outline">Edit</a>' +
              '<button type="button" class="btn btn-danger" data-id="' + item.id + '" aria-label="Delete this listing">Delete</button>' +
            '</div>';
          listEl.appendChild(card);
        });
      };

      listEl.addEventListener('click', function (e) {
        const btn = e.target.closest('button[data-id]');
        if (!btn) return;
        const id = btn.getAttribute('data-id');
        if (!id) return;
        if (!confirm('Remove this listing?')) return;
        const result = Livestock.deleteListing(id);
        LC.showToast(result.message, result.success ? 'success' : 'error');
        if (result.success) renderList();
      });

      renderList();
      window.LivestockConnect.onPageShowRefresh(renderList);
    })();
  </script>
</body>
</html>
