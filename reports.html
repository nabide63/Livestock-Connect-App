<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Generate farm reports from your livestock listings.">
  <title>Reports - Livestock Connect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header">
      <a href="#" class="back-link" aria-label="Go back to previous page" onclick="event.preventDefault(); history.back(); return false;">← Back</a>
      <h1>Reports</h1>
      <p class="text-muted">Summary of your livestock listings. Tap the button to generate.</p>
    </header>

    <button type="button" class="btn btn-primary btn-block mb-2" id="generate-btn">Generate Report</button>

    <div id="report-content" style="display: none;">
      <div class="report-summary">
        <h3>Total Listings</h3>
        <div class="value" id="report-total">0</div>
      </div>
      <div class="report-summary">
        <h3>Animals by Type</h3>
        <div id="report-by-type"></div>
      </div>
      <div class="report-summary">
        <h3>Average Weight (kg)</h3>
        <div class="value" id="report-avg-weight">0</div>
      </div>
    </div>

    <div id="report-empty" class="empty-state">
      <span class="empty-state-icon" aria-hidden="true">📊</span>
      <p>Add some animals first, then generate a report.</p>
      <a href="farmer/add-animal.html" class="btn btn-primary mt-2">Add Animal</a>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a href="dashboard.html" class="nav-item">
      <span class="nav-item-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="farmer/add-animal.html" class="nav-item">
      <span class="nav-item-icon">➕</span>
      <span>Add Animal</span>
    </a>
    <a href="farmer/my-listings.html" class="nav-item">
      <span class="nav-item-icon">📋</span>
      <span>My Listings</span>
    </a>
    <a href="reports.html" class="nav-item active" aria-current="page">
      <span class="nav-item-icon">📊</span>
      <span>Reports</span>
    </a>
    <a href="prices.html" class="nav-item">
      <span class="nav-item-icon">💰</span>
      <span>Prices</span>
    </a>
    <a href="health.html" class="nav-item">
      <span class="nav-item-icon">💚</span>
      <span>Health</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-item-icon">👤</span>
      <span>Profile</span>
    </a>
  </nav>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/livestock.js"></script>
  <script>
    (function () {
      if (!window.LivestockConnect.requireAuth('farmer')) return;

      const LC = window.LivestockConnect;
      const Livestock = window.LivestockConnectLivestock;
      const generateBtn = document.getElementById('generate-btn');
      const reportContent = document.getElementById('report-content');
      const reportEmpty = document.getElementById('report-empty');
      const reportTotal = document.getElementById('report-total');
      const reportByType = document.getElementById('report-by-type');
      const reportAvgWeight = document.getElementById('report-avg-weight');

      const renderReport = (silent) => {
        const list = Livestock.getMyListings();
        const total = list.length;

        if (total === 0) {
          reportContent.style.display = 'none';
          reportEmpty.style.display = 'block';
          return;
        }

        reportEmpty.style.display = 'none';
        reportContent.style.display = 'block';

        reportTotal.textContent = total;

        const byType = {};
        let totalWeight = 0;
        let weightCount = 0;
        list.forEach(function (item) {
          const t = item.animalType || 'Other';
          byType[t] = (byType[t] || 0) + 1;
          const w = parseFloat(item.weight);
          if (!isNaN(w)) {
            totalWeight += w;
            weightCount++;
          }
        });

        let byTypeHtml = '';
        const types = Object.keys(byType);
        if (types.length) {
          byTypeHtml = types.map(function (type) {
            return '<p class="report-by-type-row"><strong>' + type + ':</strong> ' + byType[type] + '</p>';
          }).join('');
        } else {
          byTypeHtml = '<p style="margin:0;">No data</p>';
        }
        reportByType.innerHTML = byTypeHtml;

        reportAvgWeight.textContent = weightCount > 0 ? (totalWeight / weightCount).toFixed(1) : '0';

        if (!silent) LC.showToast('Report generated.');
      };

      const refreshContent = () => renderReport(true);

      generateBtn.addEventListener('click', function () {
        renderReport();
      });

      LC.onPageShowRefresh(refreshContent);
    })();
  </script>
</body>
</html>
