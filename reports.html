<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Generate farm reports from your livestock data.">
  <title>Reports - Livestock Connect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header">
      <h1>Reports</h1>
      <p class="text-muted">Summary of your livestock. Tap the button to generate.</p>
    </header>

    <button type="button" class="btn btn-primary btn-block mb-2" id="generate-btn">Generate Report</button>

    <div id="report-content" style="display: none;">
      <div class="report-summary">
        <h3>Total Livestock</h3>
        <div class="value" id="report-total">0</div>
      </div>
      <div class="report-summary">
        <h3>Animals by Type</h3>
        <div id="report-by-type"></div>
      </div>
      <div class="report-summary">
        <h3>Average Weight (kg)</h3>
        <div class="value" id="report-avg-weight">0</div>
      </div>
    </div>

    <div id="report-empty" class="empty-state">
      <div class="empty-state-icon" aria-hidden="true">📊</div>
      <p>Add some animals first, then generate a report.</p>
      <a href="add-livestock.html" class="btn btn-primary mt-2">Add Animal</a>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a href="dashboard.html" class="nav-item">
      <span class="nav-item-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="livestock.html" class="nav-item">
      <span class="nav-item-icon">🐄</span>
      <span>Livestock</span>
    </a>
    <a href="add-livestock.html" class="nav-item">
      <span class="nav-item-icon">➕</span>
      <span>Add</span>
    </a>
    <a href="prices.html" class="nav-item">
      <span class="nav-item-icon">💰</span>
      <span>Prices</span>
    </a>
    <a href="health.html" class="nav-item">
      <span class="nav-item-icon">💚</span>
      <span>Health</span>
    </a>
  </nav>

  <script src="js/app.js"></script>
  <script>
    (function () {
      if (!window.LivestockConnect.requireAuth()) return;

      const LC = window.LivestockConnect;
      const generateBtn = document.getElementById('generate-btn');
      const reportContent = document.getElementById('report-content');
      const reportEmpty = document.getElementById('report-empty');
      const reportTotal = document.getElementById('report-total');
      const reportByType = document.getElementById('report-by-type');
      const reportAvgWeight = document.getElementById('report-avg-weight');

      const renderReport = () => {
        const stats = LC.getLivestockStats();
        if (stats.total === 0) {
          reportContent.style.display = 'none';
          reportEmpty.style.display = 'block';
          return;
        }

        reportEmpty.style.display = 'none';
        reportContent.style.display = 'block';

        reportTotal.textContent = stats.total;

        let byTypeHtml = '';
        const types = Object.keys(stats.byType);
        if (types.length) {
          byTypeHtml = types.map(function (type) {
            return '<p style="margin:0.25rem 0;"><strong>' + type + ':</strong> ' + stats.byType[type] + '</p>';
          }).join('');
        } else {
          byTypeHtml = '<p style="margin:0;">No data</p>';
        }
        reportByType.innerHTML = byTypeHtml;

        reportAvgWeight.textContent = stats.averageWeight;

        LC.showToast('Report generated.');
      };

      generateBtn.addEventListener('click', function () {
        renderReport();
      });
    })();
  </script>
</body>
</html>
